{% if faq_section.is_visible and faq_items %}
<section id="faq" class="faq-section">
 <div class="container mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
  <div class="faq-section-inner">
   <div class="faq-section-head">
    <div class="faq-badge">
     <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
     <span>{{ faq_section.badge_text }}</span>
    </div>
    <h2 class="faq-title">
     <span class="text-white">{{ faq_section.title_prefix }} </span>
     <span class="text-gradient">{{ faq_section.title_highlight }}</span>
    </h2>
    <p class="faq-desc">{{ faq_section.description }}</p>
   </div>

   <div class="faq-list">
    {% for item in faq_items %}
    <div class="faq-item">
     <button type="button" class="faq-question" aria-expanded="false">
      <span>{{ item.question }}</span>
      <svg class="faq-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
     </button>
     <div class="faq-answer" hidden>
      <p>{{ item.answer|linebreaksbr }}</p>
     </div>
    </div>
    {% endfor %}
   </div>

   <div class="faq-cta-wrap">
    <a href="#zamer" class="faq-cta-btn">
     <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
     Бесплатный замер
    </a>
   </div>
  </div>
 </div>
</section>
{% endif %}
