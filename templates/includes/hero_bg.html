{% load static %}
<div class="absolute inset-0 overflow-hidden">
 {% if site_page.has_hero_upload %}
 <img src="{{ site_page.hero_image.url }}" alt="" class="absolute inset-0 h-full w-full object-cover" fetchpriority="high" decoding="async"/>
 {% else %}
 <img src="{% static site_page.hero_static_image|default:'images/hero-bg.jpg' %}" alt="" class="absolute inset-0 h-full w-full object-cover" fetchpriority="high" decoding="async"/>
 {% endif %}
 <div class="absolute inset-0 hero-bg-overlay"></div>
</div>
